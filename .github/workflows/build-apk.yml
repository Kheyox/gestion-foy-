name: Build APK

on:
  push:
    branches: [ "claude/household-management-app-cnwuW", "main" ]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Décoder google-services.json depuis le secret GitHub
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Bump versionCode et versionName automatiquement
        if: github.ref == 'refs/heads/main'
        run: |
          RUN=${{ github.run_number }}
          DATE=$(date +'%Y%m%d')
          sed -i "s/versionCode = .*/versionCode = $RUN/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"1.$RUN\"/" app/build.gradle.kts

      - name: Build APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK (téléchargeable depuis GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: MonFoyer-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Extraire la version
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Créer une GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MonFoyer v${{ steps.version.outputs.version }}
          body: ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
