name: Build APK

on:
  push:
    branches: [ "claude/household-management-app-cnwuW", "main" ]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Décoder google-services.json depuis le secret GitHub
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Build APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK (téléchargeable depuis GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: MonFoyer-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Distribuer via Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS }}
          groups: testeurs
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Mise à jour ${{ github.event.head_commit.message }}"
